version: '3.8'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: service_user
      POSTGRES_PASSWORD: servicePassword
      POSTGRES_DB: reliability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  postgres_data: