version: '3.8'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: service_user
      POSTGRES_PASSWORD: servicePassword
      POSTGRES_DB: reliability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://service_user:servicePassword@db:5433/reliability
      POLL_INTERVAL_SECONDS: 30
      ALERT_CONSECUTIVE_FAILURES: 3
      WEBHOOK_URL: ""
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: